.course-label[DS 592 · Introduction to Sequential Decision Making]

# Two-Level Contextual Bandits<br>for Nurse Rostering

## A Construct-and-Repair Framework and Its Regime of Applicability

### Ria Sonalker · Achuthan Rathinam · Jihyeon Yun
### Boston University · Bandfest · April 2026

.slide-tag[INRC-II · LinUCB · Construct-and-Repair]

---

.sec[Motivation & Research Question]
# Nurse scheduling: problem setup

.cols[
.c1[
.bx-head[Why it matters]
.bx-body[
- NP-hard scheduling: assign nurses to shifts over **multiple weeks**
- Each week has different bottlenecks: coverage, fatigue, weekends

**Existing approaches:**
- Exact solvers → high quality, slow
- Heuristics → fast, **not adaptive**
]

.gold-box[
**Core Research Question**

Can a learned bandit policy select the right construction heuristic each week and the right repair operator each round?

→ Minimize total INRC-II penalty
]
]
.c1[
.bx-head[Pre-defined constraints (hard & soft)]
.bx-body[
**Hard** — must not be violated:
- Minimum staffing coverage
- Forbidden shift successions
- Nurse availability & requested days off

**Soft** — 7 weighted violation groups (S1–S7):
- S1: coverage meets optimal target
- S2–S3: consecutive-work / rest patterns
- S4: shift-off preferences
- S5: complete weekends
- S6–S7: total assignments & worked weekends
]

.callout[
**Baseline ignores variation → Can adaptive policies do better?**
]
]
]

---

class: eq-slide

.sec[Problem Setup]
# How we calculate penalty

A schedule $\sigma$ and carry-in history $h_1$ induce **seven soft violation counts** $v_i$ with published INRC-II weights $w_i$:

$$\mathcal{P}(\sigma,\,h_1) \;=\; \sum_{i=1}^{7} w_i\, v_i(\sigma,\,h_1)$$

.cols[
.c1[
**Why seven terms?** Each $v_i$ counts violations of one soft constraint family; $w_i$ is the contest-specified penalty per violation. We use the official weights throughout.

.callout[
Goal: construct a feasible schedule $\sigma$ that **minimises $\mathcal{P}$**.
Lower is better — same metric as the official `validator.jar`.
]
]
.c1[
**Bandit rewards = one-step penalty reduction**

**Week level** — reward for choosing construction arm at week $t$:
$$r^{(w)}_t = \mathcal{P}(\sigma_{\!\le t-1},h_1) - \mathcal{P}(\sigma_{\!\le t},h_1)$$

**Repair level** — reward for repair step $j$:
$$r^{(r)}_j = \mathcal{P}(\sigma_{j-1},h_1) - \mathcal{P}(\sigma_j,h_1)$$

Both scaled by $\rho > 0$ before updates. Repair reward **can be negative**.
]
]

---

.sec[Key Idea: Two-Level Contextual Bandit]
# Two-level bandit formulation

.cols[
.c1[
.bx-head[Week-Level Bandit]
.bx-body[
**4 construction arms** $(K_w = 4)$:
1. `coverage_first` — lowest-penalty nurse first
2. `fatigue_aware` — rested nurses first
3. `weekend_balancing` — equalises weekends worked
4. `preference_respecting` — honours shift-off requests

**Context** $x^{(w)} \in \mathbb{R}^6$: coverage slack, fatigue ratio, weekend spread, request density, assignment saturation, week position

**Goal:** build schedule week-by-week
]
]
.c1[
.bx-head[Repair-Level Bandit]
.bx-body[
**18 repair operators** $(K_r = 18)$, grouped by target:
- S1 Coverage (4): pull off-day nurse, surplus moves, skill reassign
- S2 Consecutive/shift (6): break / extend work streaks
- S3 Days off (3): break / extend rest streaks
- S4 Preferences (1): swap unwanted shifts
- S5/S7 Weekends (2): fix incomplete / overloaded weekends
- S6 Totals (1): rebalance overworked nurses
- Catch-all (1): random same-day feasible swap

**Context** $x^{(r)} \in \mathbb{R}^7$: fraction of $\mathcal{P}$ per constraint bundle + repair progress

**Goal:** iteratively reduce violations
]
]
]

.callout[
At each step: **observe context → pull arm → receive reward → update bandit**. Both bandits share the LinUCB update but operate on distinct arm sets and context spaces.
]

---

class: eq-slide

.sec[Method]
# LinUCB — the contextual algorithm

Each arm $a$ maintains a **disjoint ridge regression** via $A_a \in \mathbb{R}^{d\times d}$ and $b_a \in \mathbb{R}^d$ (init: $A_a = I_d$, $b_a = \mathbf{0}$).

**Select** arm with highest upper confidence score:

$$\hat{\theta}_a = A_a^{-1}b_a \qquad\quad \operatorname{UCB}_a(\mathbf{x}) = \underbrace{\hat{\theta}_a^\top\mathbf{x}}_{\text{exploitation}} + \alpha\underbrace{\sqrt{\mathbf{x}^\top A_a^{-1}\mathbf{x}}}_{\text{exploration bonus}}$$

**Update** after observing scaled reward $\tilde{r} = r/\rho$:

$$A_{a^\star} \leftarrow A_{a^\star} + \mathbf{x}\mathbf{x}^\top \qquad b_{a^\star} \leftarrow b_{a^\star} + \tilde{r}\,\mathbf{x}$$

.cols[
.c1[
.callout.navy[
**Baselines** (non-contextual, same arms & reward): Uniform, UCB1, Thompson sampling, $\varepsilon$-greedy. These ignore $\mathbf{x}$ entirely.
]
]
.c1[
.callout[
**Assumption:** reward $\approx$ linear in context. At repair level this is partial — actions affect the schedule state, violating stationarity. The OOD experiment quantifies the gap.
]
]
]

---

.sec[Results]
# Algorithm comparison: all week × repair pairs

.cols[
.c55[
.center.w100.shadow[![Mean final penalty heatmap — lower is better. Star = UCB1×LinUCB](figures/exp2_heatmap.png)]
.xs.center.muted[Mean final penalty (dev set) — lower is better · ★ = best pair]
]
.c45[
.bx-head[Best combination]
.bx-body[
**UCB1** (week) × **LinUCB** (repair)

→ Lowest mean final penalty: **.gold[~7,978]**
]

.gold-box[
**Key findings:**
- LinUCB repair is **best across all** week-level choices — context helps when the action space is large (18 arms, 500 rounds)
- Week-level: UCB1 stays competitive — few decisions per instance limit the value of a contextual model
- Uniform repair is worst in every row
]
]
]

---

.sec[Results]
# Does construction adaptivity help?

.center.w62.shadow[![Week-level cumulative reward: LinUCB vs fixed heuristics](figures/cumulative_reward.png)]

.callout[
LinUCB tracks the hindsight **best fixed arm** closely. Adaptivity gives **limited additional benefit** beyond picking a strong construction heuristic — this explains why UCB1 (non-contextual) stays competitive in the end-to-end comparison.
]

---

.sec[Results]
# Leave-one-feature-out: does context actually drive decisions?

.cols[
.c1[
.center.w90.shadow[![Week-level feature ablation](figures/ablation_week.png)]
.sm.center[Week-level LinUCB]
]
.c1[
.center.w90.shadow[![Repair-level feature ablation](figures/ablation_repair.png)]
.sm.center[Repair-level LinUCB]
]
]

.callout[
Masking **coverage-dominance share** (`s1_share`) hurts repair most — the violation profile is the key signal for routing among 18 operators.
Context matters substantially more at repair than at construction.
]

---

.sec[Results — Regime of Applicability]
# Out-of-distribution repair: when bandits break down

.cols[
.c1[
Repair bandit trained on **greedy-initialised** schedules. Tested on three starting distributions:

| Start | Description |
|---|---|
| **Greedy** | in-distribution |
| **Mid** | greedy + 200 LinUCB rounds |
| **Branch-and-price** | near-optimal solver (OOD) |

.callout[
LinUCB **improves** greedy and mid starts, but **degrades near-optimal** starts as repair rounds grow.

**Root cause:** the penalty-share context looks similar at very different absolute qualities. A bandit cannot represent "stop" — this gap requires an MDP with a stop action.
]
]
.c1[
.center.w88.shadow[![Penalty vs repair rounds by initialization type](figures/ood_curves.png)]
.xs.center.muted[Penalty vs. repair rounds — lower is better]
]
]

---

class: eq-slide

.sec[Conclusion & Limitations]
# Bandits work — until the schedule is nearly optimal

.cols[
.c1[
.bx-head[Main finding]
.bx-body[
Bandits substantially outperform fixed heuristics in construction and repair.

Best: **UCB1 + LinUCB → ~7,978 penalty**

Context is most valuable when the **action space is large and the horizon is long**.
]

.bx-head[When does context help?]
.bx-body[
|  | **Repair** | **Construction** |
|---|---|---|
| Arms | 18 | 4 |
| Rounds | 500 | few |
| Context | ✓ helps | limited gain |
]
]
.c1[
.bx-head[Limitations]
.bx-body[
- Repair rewards are **state-dependent** — same context, different schedule history → bandit stationarity assumption violated
- Bandit has **no "stop" action** — it keeps repairing even near-optimal schedules
- Few week-level decisions limit contextual gains
]

.bx-head[Future work]
.bx-body[
- Recast repair as **MDP** with schedule as state and a stop action
- **Online** LinUCB updates at inference to adapt to starting distribution
- Larger construction arm set to probe context leverage at week level
]
]
]

    <script>
      var slideshow = remark.create({
        ratio: '16:9',
        highlightStyle: 'github',
        highlightLines: true,
        countIncrementalSlides: false,
        navigation: { scroll: false }
      });

      function renderMath() {
        window.setTimeout(function () {
          renderMathInElement(document.body, {
            delimiters: [
              { left: '$$', right: '$$', display: true },
              { left: '$',  right: '$',  display: false }
            ],
            ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
            throwOnError: false
          });
        }, 30);
      }
      slideshow.on('showSlide', renderMath);
      slideshow.on('afterShowSlide', renderMath);
      renderMath();

      /* ── annotation canvas ─────────────────────────────────── */
      (function () {
        const canvas = document.getElementById('annotation-canvas');
        const ctx = canvas.getContext('2d');
        const indicator = document.getElementById('drawing-indicator');
        let isDrawing = false, drawingMode = false;
        let lastX = 0, lastY = 0, currentSlideIdx = 0, canvasDirty = false;
        const annotations = {};

        function setupCanvas() {
          const dpr = window.devicePixelRatio || 1;
          canvas.width  = window.innerWidth  * dpr;
          canvas.height = window.innerHeight * dpr;
          canvas.style.width  = window.innerWidth  + 'px';
          canvas.style.height = window.innerHeight + 'px';
          ctx.setTransform(1, 0, 0, 1, 0, 0);
          ctx.scale(dpr, dpr);
          ctx.lineCap = 'round'; ctx.lineJoin = 'round';
          ctx.lineWidth = 3; ctx.strokeStyle = '#c62828';
        }

        function saveAnnotations() {
          if (canvasDirty) annotations[currentSlideIdx] = canvas.toDataURL();
        }

        function restoreAnnotations(idx) {
          const dpr = window.devicePixelRatio || 1;
          canvas.width  = window.innerWidth  * dpr;
          canvas.height = window.innerHeight * dpr;
          ctx.setTransform(1, 0, 0, 1, 0, 0);
          ctx.scale(dpr, dpr);
          ctx.lineCap = 'round'; ctx.lineJoin = 'round';
          ctx.lineWidth = 3; ctx.strokeStyle = '#c62828';
          canvasDirty = false;
          if (annotations[idx]) {
            const img = new Image();
            img.onload = function () {
              if (currentSlideIdx !== idx) return;
              ctx.setTransform(1, 0, 0, 1, 0, 0);
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
              ctx.scale(dpr, dpr);
            };
            img.src = annotations[idx];
          }
        }

        function clearSlide() {
          ctx.setTransform(1, 0, 0, 1, 0, 0);
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          const dpr = window.devicePixelRatio || 1;
          ctx.scale(dpr, dpr);
          delete annotations[currentSlideIdx];
          canvasDirty = false;
        }

        function toggleDraw() {
          drawingMode = !drawingMode;
          canvas.classList.toggle('drawing', drawingMode);
          indicator.classList.toggle('visible', drawingMode);
        }

        function coords(e) {
          if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
          return { x: e.clientX, y: e.clientY };
        }

        canvas.addEventListener('mousedown',  e => { if (!drawingMode) return; isDrawing = true; const c = coords(e); lastX = c.x; lastY = c.y; });
        canvas.addEventListener('mousemove',  e => { if (!isDrawing || !drawingMode) return; e.preventDefault(); const c = coords(e); ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(c.x, c.y); ctx.stroke(); lastX = c.x; lastY = c.y; canvasDirty = true; });
        canvas.addEventListener('mouseup',    () => { if (isDrawing) { isDrawing = false; saveAnnotations(); } });
        canvas.addEventListener('mouseout',   () => { if (isDrawing) { isDrawing = false; saveAnnotations(); } });
        canvas.addEventListener('touchstart', e => { if (!drawingMode) return; isDrawing = true; const c = coords(e); lastX = c.x; lastY = c.y; }, { passive: false });
        canvas.addEventListener('touchmove',  e => { if (!isDrawing || !drawingMode) return; e.preventDefault(); const c = coords(e); ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(c.x, c.y); ctx.stroke(); lastX = c.x; lastY = c.y; canvasDirty = true; }, { passive: false });
        canvas.addEventListener('touchend',   () => { if (isDrawing) { isDrawing = false; saveAnnotations(); } });

        window.addEventListener('resize', () => { saveAnnotations(); setupCanvas(); restoreAnnotations(currentSlideIdx); });

        document.addEventListener('keydown', e => {
          if (e.key === 'd' || e.key === 'D') { toggleDraw(); e.stopPropagation(); }
          else if ((e.key === 'x' || e.key === 'X') && drawingMode) { clearSlide(); e.stopPropagation(); }
        });

        function checkSlideChange() {
          const idx = slideshow.getCurrentSlideIndex();
          if (idx !== currentSlideIdx) { saveAnnotations(); if (isDrawing) isDrawing = false; currentSlideIdx = idx; restoreAnnotations(idx); }
        }
        document.addEventListener('keyup', checkSlideChange);
        document.addEventListener('click', checkSlideChange);
        document.addEventListener('touchend', () => setTimeout(checkSlideChange, 50));
        slideshow.on('hideSlide', saveAnnotations);
        slideshow.on('showSlide', s => { currentSlideIdx = s ? s.getSlideIndex() : slideshow.getCurrentSlideIndex(); restoreAnnotations(currentSlideIdx); });

        currentSlideIdx = slideshow.getCurrentSlideIndex();
        setupCanvas();
      })();
    </script>
